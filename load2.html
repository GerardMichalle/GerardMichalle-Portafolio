<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cargando portafolio...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/loadstyle2.css?v=20260712-ready" />
  </head>
  <body class="loader-page portfolio-loading">
    <div class="preloader preloader-vader" id="preloader" role="status" aria-live="polite">
      <div class="preloader-shell vader-shell">
        <div class="preloader-brand">GRM<span>.</span></div>
        <div class="vader" aria-hidden="true">
          <div class="shadow"></div>
          <div class="head">
            <div class="helmet"><span class="left"></span><span class="right"></span></div>
            <div class="eyes"><span class="left"></span><span class="right"></span></div>
            <span class="grill"><span class="left"></span><span class="center"></span><span class="right"></span></span>
            <span class="mask"><span class="top"></span><span class="left"></span><span class="center"></span><span class="right"></span></span>
            <span class="line"></span>
          </div>
          <div class="torso">
            <span class="neck"><span class="left"></span><span class="center"></span><span class="right"></span><span class="bottom"></span></span>
            <span class="belt"><span class="center"></span></span>
            <div class="plate"><span class="red_top"></span><span class="red_center"></span><span class="red_bottom"></span><span class="blue"></span><span class="gray"></span></div>
          </div>
          <div class="hand left"><span class="hand"></span></div>
          <div class="hand right animation-right"><span class="hand"></span></div>
          <div class="legs"><span class="left"></span><span class="right"></span></div>
          <div class="boots"><span class="left"></span><span class="right"></span></div>
          <div class="sword animation-left"><span class="handle"></span><span class="light"></span></div>
        </div>
        <p class="loading-text">Preparando portafolio</p>
        <div class="progress-bar" aria-hidden="true"><div class="progress"></div></div>
        <div class="loading-meta"><span>INFRAESTRUCTURA TI</span><span>FULLSTACK DEV</span></div>
      </div>
    </div>
    <script src="assets/js/load.js?v=20260712-ready"></script>
  </body>
</html>
